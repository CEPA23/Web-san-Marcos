<title>🎉🇵🇪 Verbena por el 29° Aniversario – Coliseo Inca 🌟💙

Recordamos la emocionante verbena realizada en el Coliseo Inca, donde nuestros estudiantes de Inicial, Primaria y Secundaria brillaron en el escenario con hermosas danzas típicas del Perú, mostrando talento, identidad y orgullo por nuestras raíces.

La noche también nos regaló un momento especial: nuestros docentes sorprendieron a todos con presentaciones musicales llenas de alegría y energía, haciendo de esta celebración una experiencia inolvidable.

Una velada que unió a toda la familia sanmarquina en arte, tradición y compañerismo. 🌟🎶

#verbenasanmarquina #29Aniversario #DanzasTípicas #OrgulloSanmarquino #coliseoinca #FiestaCultural #celebraciones #aniversario | IEP Mayor de San Marcos</title>
